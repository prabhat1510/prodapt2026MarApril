<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Customer Form</title>

    <!-- Bootstrap CSS -->
    <link href="../node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="index.js"></script>
    <style>
        .error {
            color: red;
            font-size: 13px;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card p-4">

            <!-- FORM -->
            <div class="mb-3">
                <label>Name:</label>
                <input type="text" id="name" class="form-control" placeholder="Enter Name">
                <span id="nameError" class="error"></span>
            </div>

            <div class="mb-3">
                <label>Email Id:</label>
                <input type="text" id="email" class="form-control" placeholder="Enter email">
                <span id="emailError" class="error"></span>
            </div>

            <div class="mb-3">
                <label>Contact No:</label>
                <input type="text" id="contact" class="form-control" placeholder="Enter contact no">
                <span id="contactError" class="error"></span>
            </div>

            <div class="mb-3">
                <label>Account Type:</label>
                <select id="account" class="form-control">
                    <option value="">Select account type</option>
                    <option value="savings">Savings</option>
                    <option value="current">Current</option>
                </select>
                <span id="accountError" class="error"></span>
            </div>

            <button class="btn btn-primary" onclick="addCustomer()">Add Customer</button>
        </div>

        <!-- TABLE -->
        <div class="card mt-4 p-3">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Contact</th>
                        <th>Account Type</th>
                    </tr>
                </thead>
                <tbody id="customerTable">
                </tbody>
            </table>
        </div>
    </div>



</body>

</html>
